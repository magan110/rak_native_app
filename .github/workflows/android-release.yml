name: Build Android App Bundle (release)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Create keystores dir
        run: mkdir -p keystores

      - name: Decode keystore from secret
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystores/rak_keystore.jks

      - name: Write key.properties from secrets
        run: |
          cat > key.properties <<'EOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          # Path is relative to android/app, so use ../keystores to point to repo root
          storeFile=../keystores/rak_keystore.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AppBundle (release)
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
        run: flutter build appbundle --release --no-shrink

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/*.aab
